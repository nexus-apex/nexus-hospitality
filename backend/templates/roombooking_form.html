{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} RoomBooking | NexusHospitality{% endblock %}
{% block page_title %}{% if editing %}Edit RoomBooking{% else %}New RoomBooking{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Property Name</label>
        <input type="text" name="property_name" value="{{ record.property_name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Guest Name</label>
        <input type="text" name="guest_name" value="{{ record.guest_name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Room Type</label>
        <select name="room_type">
          <option value="standard" {% if record.room_type == 'standard' %}selected{% endif %}>Standard</option>
          <option value="deluxe" {% if record.room_type == 'deluxe' %}selected{% endif %}>Deluxe</option>
          <option value="suite" {% if record.room_type == 'suite' %}selected{% endif %}>Suite</option>
          <option value="villa" {% if record.room_type == 'villa' %}selected{% endif %}>Villa</option>
        </select>
      </div>
      <div class="form-group">
        <label>Check In</label>
        <input type="date" name="check_in" value="{{ record.check_in|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Check Out</label>
        <input type="date" name="check_out" value="{{ record.check_out|date:'Y-m-d'|default:'' }}">
      </div>
      <div class="form-group">
        <label>Amount</label>
        <input type="number" step="0.01" name="amount" value="{{ record.amount|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="confirmed" {% if record.status == 'confirmed' %}selected{% endif %}>Confirmed</option>
          <option value="checked_in" {% if record.status == 'checked_in' %}selected{% endif %}>Checked In</option>
          <option value="checked_out" {% if record.status == 'checked_out' %}selected{% endif %}>Checked Out</option>
          <option value="cancelled" {% if record.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
        </select>
      </div>
      <div class="form-group">
        <label>Source</label>
        <select name="source">
          <option value="direct" {% if record.source == 'direct' %}selected{% endif %}>Direct</option>
          <option value="ota" {% if record.source == 'ota' %}selected{% endif %}>OTA</option>
          <option value="agent" {% if record.source == 'agent' %}selected{% endif %}>Agent</option>
        </select>
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} RoomBooking</button>
      <a href="/roombookings/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
