{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} HotelGuest | NexusHospitality{% endblock %}
{% block page_title %}{% if editing %}Edit HotelGuest{% else %}New HotelGuest{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ record.email|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" value="{{ record.phone|default:'' }}">
      </div>
      <div class="form-group">
        <label>Nationality</label>
        <input type="text" name="nationality" value="{{ record.nationality|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Visits</label>
        <input type="number" name="visits" value="{{ record.visits|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Total Spent</label>
        <input type="number" step="0.01" name="total_spent" value="{{ record.total_spent|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Loyalty Tier</label>
        <select name="loyalty_tier">
          <option value="member" {% if record.loyalty_tier == 'member' %}selected{% endif %}>Member</option>
          <option value="silver" {% if record.loyalty_tier == 'silver' %}selected{% endif %}>Silver</option>
          <option value="gold" {% if record.loyalty_tier == 'gold' %}selected{% endif %}>Gold</option>
          <option value="platinum" {% if record.loyalty_tier == 'platinum' %}selected{% endif %}>Platinum</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Preferences</label>
      <textarea name="preferences">{{ record.preferences|default:'' }}</textarea>
    </div>
    <div class="form-group">
      <div class="checkbox-wrapper">
        <input type="checkbox" name="vip" id="id_vip" {% if record.vip %}checked{% endif %}>
        <label for="id_vip" style="margin-bottom:0">Vip</label>
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} HotelGuest</button>
      <a href="/hotelguests/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
